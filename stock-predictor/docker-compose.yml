version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ml
      POSTGRES_PASSWORD: ml
      POSTGRES_DB: stocks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns
    ports:
      - "5001:5001"
    working_dir: /mlflow
    volumes:
      - mlflowdata:/mlflow
volumes:
  pgdata:
  mlflowdata:
